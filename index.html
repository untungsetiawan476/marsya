<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎉 Milad Mubarak Marsya! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1e;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            width: 100%;
            height: 100%;
            position: fixed;
        }

        #fireworksCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Amplop container */
        .envelope-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.6s ease;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.7));
            width: 85%;
            max-width: 320px;
        }

        .envelope {
            width: 100%;
            aspect-ratio: 320 / 220;
            background: #fad6a5;
            position: relative;
            border-radius: 16px 16px 12px 12px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            border: 4px solid #b57c48;
            transform-origin: center;
            overflow: hidden;
            margin: 0 auto;
        }

        .envelope .lego-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 10px 10px, #e6b06b 4px, transparent 4px);
            background-size: 30px 30px;
            opacity: 0.4;
            z-index: 2;
            pointer-events: none;
        }

        .flap {
            position: absolute;
            top: -15%;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent; /* Statis untuk ukuran max-width */
            border-right: 160px solid transparent;
            border-bottom: 80px solid #f5bc7c;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 4;
            filter: drop-shadow(0 -8px 8px rgba(0,0,0,0.2));
        }

        /* Perbaikan flap untuk mobile */
        @media (max-width: 400px) {
            .flap {
                border-left-width: 40vw;
                border-right-width: 40vw;
            }
        }

        .body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fad6a5;
            border-radius: 12px;
            z-index: 3;
        }

        .border-decor {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 3px dashed #b57c48;
            border-radius: 10px;
            z-index: 5;
            pointer-events: none;
        }

        .name-inside {
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #8b5a2b;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive;
            text-shadow: 2px 2px 0 #f5e1c0;
            z-index: 6;
            pointer-events: none;
            opacity: 0.9;
            transform: rotate(-2deg);
            padding: 0 10px;
        }

        .butterfly-static {
            position: absolute;
            font-size: clamp(1.5rem, 5vw, 2rem);
            user-select: none;
            pointer-events: none;
            filter: drop-shadow(0 0 8px hotpink);
            z-index: 10;
            opacity: 0.9;
        }

        .b1 { top: -15%; left: -10%; transform: rotate(-20deg); }
        .b2 { bottom: -15%; right: -10%; transform: rotate(25deg); }
        .b3 { top: -10%; right: -8%; transform: rotate(15deg); }
        .b4 { bottom: -10%; left: -8%; transform: rotate(-10deg); }

        .shake {
            animation: shake 0.5s infinite ease-in-out;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
            100% { transform: translateX(0); }
        }

        .envelope.open .flap {
            transform: rotateX(180deg) translateY(-20%);
        }

        .click-text {
            color: white;
            margin-top: 20px;
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            text-shadow: 0 0 20px gold, 0 0 40px orange;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 16px;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 215, 0, 0.8);
            font-weight: bold;
            letter-spacing: 1px;
            max-width: 90%;
        }

        .flying-butterflies {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        .fly {
            position: absolute;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            opacity: 0.9;
            filter: drop-shadow(0 0 12px currentColor);
            animation: flyAnim 5s linear forwards;
            color: gold;
            z-index: 15;
        }

        @keyframes flyAnim {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="birthdayMusic" loop>
        <source src="ulangtahun.mp3" type="audio/mpeg">
        </audio>

    <div class="envelope-container" id="envelopeContainer">
        <div class="envelope shake" id="envelope">
            <div class="lego-pattern"></div>
            <div class="flap"></div>
            <div class="body"></div>
            <div class="border-decor"></div>
            <div class="name-inside">✨ Marsya Suci Nur Utami ✨</div>
            <div class="butterfly-static b1">🦋</div>
            <div class="butterfly-static b2">🦋</div>
            <div class="butterfly-static b3">🦋</div>
            <div class="butterfly-static b4">🦋</div>
        </div>
        <div class="click-text">💖 Klik untuk membuka kejutan 💖</div>
    </div>

    <div class="flying-butterflies" id="butterflyContainer"></div>
    <canvas id="fireworksCanvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('fireworksCanvas');
            const ctx = canvas.getContext('2d');
            const music = document.getElementById('birthdayMusic');

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const messages = [
                "Milad Mubarak, santri shalihah! 🎉",
                "Semoga hafalan makin lancar.",
                "Murojaahnya makin rajin ya.",
                "Qur’an selalu di hati.",
                "Jadi kebanggaan orang tua.",
                "Jadi kebanggaan para guru.",
                "Ilmunya makin berkah.",
                "Senyum dan semangat terus!",
                "Calon penjaga Al-Qur’an. 🌙"
            ];

            let messageIndex = 0;

            function releaseButterflies() {
                const container = document.getElementById('butterflyContainer');
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                for (let i = 0; i < 16; i++) {
                    const b = document.createElement('div');
                    b.className = 'fly';
                    b.innerHTML = '🦋';
                    b.style.left = centerX + 'px';
                    b.style.top = centerY + 'px';
                    const tx = (Math.random() - 0.5) * window.innerWidth * 1.5;
                    const ty = (Math.random() - 0.8) * window.innerHeight * 1.5;
                    b.style.setProperty('--tx', tx + 'px');
                    b.style.setProperty('--ty', ty + 'px');
                    const hue = Math.random() * 360;
                    b.style.color = `hsl(${hue}, 100%, 65%)`;
                    container.appendChild(b);
                    setTimeout(() => b.remove(), 5000);
                }
            }

            function showMessage(text, x, y, color) {
                const msg = document.createElement('div');
                msg.textContent = text;
                msg.style.position = 'absolute';
                msg.style.left = '50%';
                let safeY = Math.min(Math.max(y, 100), window.innerHeight - 120);
                msg.style.top = safeY + 'px';
                msg.style.color = color;
                msg.style.fontSize = 'clamp(1.1rem, 5vw, 1.5rem)';
                msg.style.fontWeight = 'bold';
                msg.style.fontFamily = "'Segoe UI', 'Arial', sans-serif";
                msg.style.textShadow = `0 0 15px ${color}, 0 0 30px black`;
                msg.style.zIndex = '30';
                msg.style.width = '90%'; 
                msg.style.maxWidth = '350px'; 
                msg.style.textAlign = 'center';
                msg.style.transform = 'translate(-50%, -50%) scale(0.5)';
                msg.style.opacity = '0';
                msg.style.transition = 'opacity 0.4s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                msg.style.pointerEvents = 'none';
                msg.style.letterSpacing = '0.5px';
                msg.style.lineHeight = '1.4';
                msg.style.padding = '12px 20px';
                msg.style.background = 'rgba(0, 0, 0, 0.7)';
                msg.style.borderRadius = '20px';
                msg.style.backdropFilter = 'blur(4px)';
                msg.style.border = `1px solid ${color}`;
                msg.style.boxShadow = '0 10px 20px rgba(0,0,0,0.5)';
                document.body.appendChild(msg);

                requestAnimationFrame(() => {
                    msg.style.opacity = '1';
                    msg.style.transform = 'translate(-50%, -50%) scale(1)';
                });

                setTimeout(() => {
                    msg.style.opacity = '0';
                    msg.style.transform = 'translate(-50%, -100px) scale(0.9)';
                }, 2000);

                setTimeout(() => {
                    if (msg.parentNode) msg.remove();
                }, 3000);
            }

            class Particle {
                constructor(x, y, color, shape = 'circle') {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    this.shape = shape;
                    this.velocity = {
                        x: (Math.random() - 0.5) * 8,
                        y: (Math.random() - 0.5) * 8
                    };
                    this.alpha = 1;
                    this.size = Math.random() * 4 + 2;
                    this.decay = Math.random() * 0.015 + 0.01;
                }
                update() {
                    this.x += this.velocity.x;
                    this.y += this.velocity.y;
                    this.alpha -= this.decay;
                }
                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 10;
                    if (this.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                    }
                    ctx.restore();
                }
            }

            class Firework {
                constructor(startX, startY, targetX, targetY, message) {
                    this.x = startX;
                    this.y = startY;
                    this.targetX = targetX;
                    this.targetY = targetY;
                    this.message = message;
                    this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                    this.velocity = {
                        x: (targetX - startX) / 70,
                        y: (targetY - startY) / 70
                    };
                    this.size = 4;
                    this.particles = [];
                    this.exploded = false;
                    this.life = 70;
                }
                update() {
                    if (!this.exploded) {
                        this.x += this.velocity.x;
                        this.y += this.velocity.y;
                        this.life--;
                        if (this.life <= 0 || Math.hypot(this.targetX - this.x, this.targetY - this.y) < 10) {
                            this.explode();
                        }
                    } else {
                        for (let i = this.particles.length - 1; i >= 0; i--) {
                            this.particles[i].update();
                            if (this.particles[i].alpha <= 0) {
                                this.particles.splice(i, 1);
                            }
                        }
                    }
                }
                explode() {
                    this.exploded = true;
                    for (let i = 0; i < 60; i++) {
                        const shape = Math.random() > 0.4 ? 'circle' : 'square';
                        this.particles.push(new Particle(this.x, this.y, this.color, shape));
                    }
                    showMessage(this.message, this.x, this.y, this.color);
                }
                draw() {
                    if (!this.exploded) {
                        ctx.save();
                        ctx.fillStyle = 'white';
                        ctx.shadowColor = this.color;
                        ctx.shadowBlur = 15;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    } else {
                        this.particles.forEach(p => p.draw(ctx));
                    }
                }
            }

            let fireworks = [];
            let frame = 0;
            let fireworksActive = false;

            function launchFromRight() {
                const startX = canvas.width + 50;
                const startY = canvas.height + 50;
                const targetX = canvas.width * (0.3 + Math.random() * 0.4); 
                const targetY = canvas.height * (0.2 + Math.random() * 0.4); 
                const msg = messages[messageIndex % messages.length];
                messageIndex++;
                fireworks.push(new Firework(startX, startY, targetX, targetY, msg));
            }

            function launchFromLeft() {
                const startX = -50;
                const startY = canvas.height + 50;
                const targetX = canvas.width * (0.3 + Math.random() * 0.4);
                const targetY = canvas.height * (0.2 + Math.random() * 0.4);
                const msg = messages[messageIndex % messages.length];
                messageIndex++;
                fireworks.push(new Firework(startX, startY, targetX, targetY, msg));
            }

            function animate() {
                ctx.fillStyle = 'rgba(10, 15, 30, 0.25)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (fireworksActive) {
                    frame++;
                    if (frame % 100 === 0) launchFromRight();
                    if (frame % 100 === 50) launchFromLeft();

                    for (let i = fireworks.length - 1; i >= 0; i--) {
                        fireworks[i].update();
                        fireworks[i].draw();
                        if (fireworks[i].exploded && fireworks[i].particles.length === 0) {
                            fireworks.splice(i, 1);
                        }
                    }
                } else {
                    ctx.fillStyle = '#0a0f1e';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                requestAnimationFrame(animate);
            }

            animate();

            const envelopeContainer = document.getElementById('envelopeContainer');
            const envelope = document.getElementById('envelope');

            envelopeContainer.addEventListener('click', function() {
                // Memulai musik
                music.play().catch(error => console.log("Musik butuh interaksi user."));
                
                envelopeContainer.style.pointerEvents = 'none';
                envelope.classList.remove('shake');
                envelope.classList.add('open');
                releaseButterflies();

                setTimeout(() => {
                    fireworksActive = true;
                    envelopeContainer.style.opacity = '0';
                    setTimeout(() => {
                        envelopeContainer.style.display = 'none';
                    }, 600);
                }, 800);
            });
        })();
    </script>
</body>
</html>
